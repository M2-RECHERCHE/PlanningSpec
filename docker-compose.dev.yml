services:
  mysql:
    ports:
      - "${MYSQL_PORT_PUBLIC:-3306}:3306"
    restart: unless-stopped

  backend:
    build:
      target: dev
    environment:
      NODE_ENV: development
      APP_ENV: dev
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      MINIZINC_WORKDIR: ${MINIZINC_WORKDIR:-/var/lib/planify/minizinc}
    command: ["pnpm", "--filter", "planning-spec-server", "dev"]
    ports:
      - "${BACKEND_PORT_PUBLIC:-4000}:4000"
    volumes:
      - .:/app
      - pnpm_store:/pnpm
      - root_node_modules:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules
      - backend_language_node_modules:/app/backend/packages/language/node_modules
      - backend_server_node_modules:/app/backend/packages/server/node_modules
      - backend_cli_node_modules:/app/backend/packages/cli/node_modules
      - backend_extension_node_modules:/app/backend/packages/extension/node_modules
      - minizinc_workdir:/var/lib/planify/minizinc
    read_only: false
    restart: unless-stopped

  planning-solver:
    ports:
      - "${OPTAPLANNER_PORT_PUBLIC:-8084}:8084"
    restart: unless-stopped

  frontend:
    build:
      target: dev
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      WDS_SOCKET_PORT: ${FRONTEND_PORT_PUBLIC:-3000}
      REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:4000}
    command: ["pnpm", "--filter", "planning-spec-frontend", "start"]
    ports:
      - "${FRONTEND_PORT_PUBLIC:-3000}:3000"
    volumes:
      - .:/app
      - pnpm_store:/pnpm
      - root_node_modules:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules
      - backend_language_node_modules:/app/backend/packages/language/node_modules
      - backend_server_node_modules:/app/backend/packages/server/node_modules
      - backend_cli_node_modules:/app/backend/packages/cli/node_modules
      - backend_extension_node_modules:/app/backend/packages/extension/node_modules
    read_only: false
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s
    restart: unless-stopped

  adminer:
    image: adminer:4
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    ports:
      - "${ADMINER_PORT_PUBLIC:-8081}:8080"
    networks:
      - public
      - internal
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: ${PHPMYADMIN_UPLOAD_LIMIT:-256M}
    ports:
      - "${PHPMYADMIN_PORT_PUBLIC:-8082}:80"
    networks:
      - public
      - internal
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.17
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-root-token-change-me}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: ["server", "-dev"]
    cap_add:
      - IPC_LOCK
    ports:
      - "${VAULT_PORT_PUBLIC:-8200}:8200"
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

volumes:
  pnpm_store:
  root_node_modules:
  frontend_node_modules:
  backend_language_node_modules:
  backend_server_node_modules:
  backend_cli_node_modules:
  backend_extension_node_modules:
