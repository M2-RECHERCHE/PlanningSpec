name: planify-${APP_ENV:-dev}

x-app-security: &app-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-regent@2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-planning_spec}
      MYSQL_USER: ${MYSQL_USER:-planify}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-regent@2026}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: ..
      dockerfile: deployment/docker/backend.Dockerfile
      target: runtime
      args:
        MINIZINC_VERSION: ${MINIZINC_VERSION:-2.9.7}
        MINIZINC_BUNDLE_SHA256: ${MINIZINC_BUNDLE_SHA256:-7e78d3a1d6feec2f5b6a43628632decb6995755ade92ff4e51a2188c54ca6399}
        MINIZINC_SOLVER_PACKAGES: ${MINIZINC_SOLVER_PACKAGES:-}
        REQUIRE_MINIZINC_SOLVERS: ${REQUIRE_MINIZINC_SOLVERS:-Gecode Chuffed HiGHS}
    image: planify-backend:${APP_TAG:-local}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_ENV: ${APP_ENV:-dev}
      PORT: ${BACKEND_PORT:-4000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080,http://localhost}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-planning_spec}
      MYSQL_USER: ${MYSQL_USER:-planify}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-planning_spec}
      MYSQL_CONNECTION_LIMIT: ${MYSQL_CONNECTION_LIMIT:-10}
      AUTH_SESSION_TTL_DAYS: ${AUTH_SESSION_TTL_DAYS:-90}
      AUTH_TOKEN_BYTES: ${AUTH_TOKEN_BYTES:-32}
      MINIZINC_PATH: ${MINIZINC_PATH:-/usr/bin/minizinc}
      MINIZINC_DEFAULT_SOLVER: ${MINIZINC_DEFAULT_SOLVER:-chuffed}
      MINIZINC_WORKDIR: ${MINIZINC_WORKDIR:-/var/lib/planify/minizinc}
      MINIZINC_ENABLE_TIMEOUT: ${MINIZINC_ENABLE_TIMEOUT:-false}
      MINIZINC_DEFAULT_TIME_LIMIT: ${MINIZINC_DEFAULT_TIME_LIMIT:-0}
      SSE_HEARTBEAT_INTERVAL: ${SSE_HEARTBEAT_INTERVAL:-15000}
      OPTAPLANNER_URL: ${OPTAPLANNER_URL:-http://planning-solver:8084}
      OPTAPLANNER_TIMEOUT_MS: ${OPTAPLANNER_TIMEOUT_MS:-0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      VAULT_ADDR: ${VAULT_ADDR:-}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - minizinc_workdir:/var/lib/planify/minizinc
    tmpfs:
      - /tmp:size=512m,mode=1777
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:'+(process.env.PORT||4000)+'/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    <<: *app-security

  planning-solver:
    profiles:
      - optaplanner
    build:
      context: ../src/backend/planning-solver-springboot
      dockerfile: Dockerfile
    image: planify-planning-solver:${APP_TAG:-local}
    environment:
      SERVER_PORT: 8084
      JAVA_OPTS: ${OPTAPLANNER_JAVA_OPTS:-}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8084/api/planning/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    <<: *app-security

  frontend:
    build:
      context: ..
      dockerfile: deployment/docker/frontend.Dockerfile
      target: runtime
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-}
    image: planify-frontend:${APP_TAG:-local}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - public
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/cache/nginx:size=64m,mode=1777
      - /var/run:size=8m,mode=1777
    <<: *app-security

networks:
  public:
  internal:
    internal: true

volumes:
  mysql_data:
  minizinc_workdir:
